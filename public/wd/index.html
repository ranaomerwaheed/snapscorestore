<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapScoreStore – WhatsApp Dispatcher</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --gold:#FFD700;--gold2:#FF8C00;
  --green:#25D366;--green2:#1da851;
  --black:#080808;--dark:#111;
  --card:rgba(16,16,16,0.92);
  --border:rgba(255,215,0,0.16);
  --text:#F2F2F2;--dim:#777;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Rajdhani',sans-serif;
  background:var(--black);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 65% 45% at 12% 8%,rgba(255,215,0,0.08) 0%,transparent 60%),
    radial-gradient(ellipse 55% 40% at 88% 85%,rgba(37,211,102,0.07) 0%,transparent 55%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,215,0,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,215,0,0.025) 1px,transparent 1px);
  background-size:50px 50px;pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:28px 18px 80px;}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;gap:16px;
  margin-bottom:30px;padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.hdr img{height:46px;filter:drop-shadow(0 0 14px rgba(255,215,0,0.55));}
.hdr-text h1{
  font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;
  color:var(--gold);letter-spacing:.07em;
  text-shadow:0 0 22px rgba(255,215,0,0.4);
}
.hdr-text p{font-size:.72rem;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-top:3px;}
.hdr-badge{
  margin-left:auto;display:flex;flex-direction:column;gap:5px;align-items:flex-end;
}
.badge{
  font-family:'Orbitron',monospace;font-size:.56rem;font-weight:700;
  letter-spacing:.1em;padding:4px 11px;border-radius:20px;white-space:nowrap;
}
.badge-gold{background:linear-gradient(135deg,#FFD700,#FF8C00);color:#000;}
.badge-wa{background:linear-gradient(135deg,#25D366,#1da851);color:#fff;}

/* ── SECTION DIVIDER ── */
.sec-divider{
  display:flex;align-items:center;gap:10px;
  margin:22px 0 14px;
}
.sec-divider span{
  font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;
  letter-spacing:.16em;color:var(--gold);text-transform:uppercase;
  white-space:nowrap;
}
.sec-divider::before,.sec-divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,0.25),transparent);
}

/* ── CARD ── */
.card{
  background:var(--card);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:16px;
  padding:22px 22px;margin-bottom:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,215,0,.06);
  transition:border-color .3s;
}
.card:hover{border-color:rgba(255,215,0,.26);}

/* ── RECEIVER BOX (special) ── */
.receiver-card{
  background:linear-gradient(135deg,rgba(37,211,102,0.08),rgba(16,16,16,0.95));
  border:1px solid rgba(37,211,102,0.28);
  border-radius:16px;padding:22px;margin-bottom:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px rgba(37,211,102,0.1);
}
.receiver-card .ctitle{color:var(--green);}
.receiver-card .ctitle i{color:var(--green);}

/* ── FORM ── */
.ctitle{
  font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;
  letter-spacing:.16em;color:var(--gold);text-transform:uppercase;
  display:flex;align-items:center;gap:9px;
  margin-bottom:16px;padding-bottom:11px;
  border-bottom:1px solid var(--border);
}
.fgroup{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.fgroup:last-child{margin-bottom:0;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

label{
  font-size:.65rem;letter-spacing:.13em;text-transform:uppercase;
  color:var(--dim);font-weight:600;display:flex;align-items:center;gap:6px;
}
label i{font-size:.75rem;}

.iw{display:flex;position:relative;}
input[type=text],input[type=tel]{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,215,0,0.14);
  border-radius:10px 0 0 10px;
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  font-size:.92rem;font-weight:500;
  padding:10px 13px;
  outline:none;
  transition:border-color .25s,box-shadow .25s,background .25s;
}
input[type=text]:focus,input[type=tel]:focus{
  border-color:var(--gold);
  background:rgba(255,215,0,0.06);
  box-shadow:0 0 0 3px rgba(255,215,0,0.1);
}
.receiver-card input[type=tel]{
  border-color:rgba(37,211,102,0.25);
}
.receiver-card input[type=tel]:focus{
  border-color:var(--green);
  background:rgba(37,211,102,0.06);
  box-shadow:0 0 0 3px rgba(37,211,102,0.12);
}

/* full-width input (no paste btn) */
input.no-paste{border-radius:10px;}

.pbtn{
  background:linear-gradient(135deg,#FFD700,#FF8C00);
  border:none;outline:none;cursor:pointer;
  color:#000;font-family:'Orbitron',monospace;
  font-size:.52rem;font-weight:700;letter-spacing:.1em;
  padding:0 11px;
  border-radius:0 10px 10px 0;
  display:flex;align-items:center;gap:4px;
  white-space:nowrap;min-width:60px;justify-content:center;
  transition:opacity .2s,transform .15s;
  border-left:1px solid rgba(0,0,0,0.15);
}
.pbtn:hover{opacity:.82;transform:scale(1.03);}
.pbtn:active{transform:scale(.97);}
.pbtn i{font-size:.7rem;}

.receiver-card .pbtn{
  background:linear-gradient(135deg,#25D366,#1da851);
}

/* ── PREVIEW BOX ── */
.preview-wrap{margin-top:6px;}
.preview-label{
  font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);font-family:'Orbitron',monospace;font-weight:700;
  margin-bottom:8px;display:flex;align-items:center;gap:7px;
}
.preview-label i{color:var(--green);}
.preview-box{
  background:rgba(37,211,102,0.06);
  border:1px solid rgba(37,211,102,0.2);
  border-radius:12px;padding:16px 18px;
  font-family:'Rajdhani',sans-serif;
  font-size:.9rem;line-height:1.7;
  color:#ddd;
  white-space:pre-wrap;
  word-break:break-word;
  min-height:60px;
  max-height:320px;
  overflow-y:auto;
}
.preview-box.empty{
  color:var(--dim);font-style:italic;font-size:.82rem;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
}
.preview-box::-webkit-scrollbar{width:4px;}
.preview-box::-webkit-scrollbar-track{background:transparent;}
.preview-box::-webkit-scrollbar-thumb{background:rgba(37,211,102,0.3);border-radius:4px;}

/* ── DISPATCH BUTTON ── */
.dispatch-btn{
  width:100%;
  background:linear-gradient(135deg,#25D366 0%,#20b858 50%,#1da851 100%);
  border:none;outline:none;
  color:#fff;font-family:'Orbitron',monospace;
  font-size:.88rem;font-weight:900;letter-spacing:.16em;
  text-transform:uppercase;padding:18px;border-radius:14px;
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 8px 30px rgba(37,211,102,0.38);
  transition:all .3s;margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:12px;
}
.dispatch-btn::before{
  content:'';position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
  transition:left .5s;
}
.dispatch-btn:hover::before{left:100%;}
.dispatch-btn:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(37,211,102,0.52);}
.dispatch-btn:active{transform:translateY(0);}
.dispatch-btn i{font-size:1.1rem;}

/* ── CLEAR BTN ── */
.clear-btn{
  width:100%;margin-top:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--dim);font-family:'Orbitron',monospace;
  font-size:.65rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;padding:12px;border-radius:12px;
  cursor:pointer;transition:all .25s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.clear-btn:hover{background:rgba(255,60,60,0.1);border-color:rgba(255,60,60,0.25);color:#ff7070;}

/* ── FIELD COUNTER ── */
.field-count{
  display:flex;justify-content:center;gap:8px;
  margin-bottom:14px;flex-wrap:wrap;
}
.fc-pill{
  font-size:.62rem;font-family:'Orbitron',monospace;font-weight:700;
  letter-spacing:.1em;padding:4px 10px;border-radius:20px;
  background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.2);
  color:rgba(255,215,0,0.7);
  transition:all .3s;
}
.fc-pill.filled{
  background:rgba(37,211,102,0.12);border-color:rgba(37,211,102,0.35);
  color:var(--green);
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:#1a1a1a;color:var(--gold);
  font-family:'Orbitron',monospace;font-size:.66rem;font-weight:700;
  letter-spacing:.1em;padding:10px 22px;border-radius:30px;
  border:1px solid var(--gold);z-index:9999;
  transition:transform .35s cubic-bezier(.68,-.55,.27,1.55),opacity .35s;
  opacity:0;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.green{border-color:var(--green);color:var(--green);}

/* ── RESPONSIVE ── */
@media(max-width:580px){
  .fg2,.fg3{grid-template-columns:1fr 1fr;}
}
@media(max-width:400px){
  .fg2,.fg3{grid-template-columns:1fr;}
  .hdr{flex-wrap:wrap;}
  .hdr-badge{margin-left:0;flex-direction:row;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header class="hdr">
    <img src="https://freesnapscores.com/assets/logo.svg" alt="SnapScoreStore">
    <div class="hdr-text">
      <h1>SnapScoreStore</h1>
      <p>WhatsApp Account Dispatcher</p>
    </div>
    <div class="hdr-badge">
      <span class="badge badge-gold">⚡ Pro Tool</span>
      <span class="badge badge-wa"><i class="fab fa-whatsapp"></i> Dispatcher</span>
    </div>
  </header>

  <!-- ① RECEIVER -->
  <div class="receiver-card">
    <div class="ctitle"><i class="fab fa-whatsapp"></i>Receiver WhatsApp Number</div>
    <div class="fgroup">
      <label><i class="fas fa-phone"></i>Phone Number (with country code)</label>
      <div class="iw">
        <input type="tel" id="f_receiver" placeholder="+92 300 1234567" oninput="livePreview()">
        <button class="pbtn" onclick="pf('f_receiver')"><i class="fas fa-paste"></i>PASTE</button>
      </div>
    </div>
  </div>

  <!-- ② ACCOUNT CREDENTIALS -->
  <div class="card">
    <div class="ctitle"><i class="fas fa-ghost"></i>Account Credentials</div>
    <div class="fg2">
      <div class="fgroup">
        <label><i class="fas fa-user"></i>Username</label>
        <div class="iw">
          <input type="text" id="f_user" placeholder="@username" oninput="livePreview()">
          <button class="pbtn" onclick="pf('f_user')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
      <div class="fgroup">
        <label><i class="fas fa-lock"></i>Password</label>
        <div class="iw">
          <input type="text" id="f_pass" placeholder="Password" oninput="livePreview()">
          <button class="pbtn" onclick="pf('f_pass')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ③ EMAIL CREDENTIALS -->
  <div class="card">
    <div class="ctitle"><i class="fas fa-envelope-open-text"></i>Email Credentials</div>
    <div class="fg2">
      <div class="fgroup">
        <label><i class="fas fa-at"></i>Account Email</label>
        <div class="iw">
          <input type="text" id="f_email" placeholder="account@gmail.com" oninput="livePreview()">
          <button class="pbtn" onclick="pf('f_email')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
      <div class="fgroup">
        <label><i class="fas fa-key"></i>Email Password</label>
        <div class="iw">
          <input type="text" id="f_emailpass" placeholder="Email password" oninput="livePreview()">
          <button class="pbtn" onclick="pf('f_emailpass')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ④ STATS & PRICE -->
  <div class="card">
    <div class="ctitle"><i class="fas fa-chart-bar"></i>Stats & Pricing</div>
    <div class="fg3">
      <div class="fgroup">
        <label><i class="fas fa-fire"></i>Snap Score</label>
        <div class="iw">
          <input type="text" id="f_score" placeholder="e.g. 125K" oninput="livePreview()">
          <button class="pbtn" onclick="pf('f_score')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
      <div class="fgroup">
        <label><i class="fas fa-users"></i>Followers</label>
        <div class="iw">
          <input type="text" id="f_followers" placeholder="e.g. 4500" oninput="livePreview()">
          <button class="pbtn" onclick="pf('f_followers')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
      <div class="fgroup">
        <label><i class="fas fa-tag"></i>Price / Method</label>
        <div class="iw">
          <input type="text" id="f_price" placeholder="PKR 1,200" oninput="livePreview()">
          <button class="pbtn" onclick="pf('f_price')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ⑤ LIVE PREVIEW -->
  <div class="card">
    <div class="ctitle"><i class="fas fa-eye"></i>Live Message Preview</div>

    <!-- Field counter pills -->
    <div class="field-count" id="fieldCount"></div>

    <div class="preview-wrap">
      <div class="preview-label"><i class="fab fa-whatsapp"></i>Message that will be sent</div>
      <div class="preview-box empty" id="previewBox">
        Fill in fields above to see the WhatsApp message preview...
      </div>
    </div>
  </div>

  <!-- DISPATCH BUTTON -->
  <button class="dispatch-btn" onclick="dispatch()">
    <i class="fab fa-whatsapp"></i>
    Dispatch to WhatsApp
  </button>

  <button class="clear-btn" onclick="clearAll()">
    <i class="fas fa-trash-alt"></i> Clear All Fields
  </button>

</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════
   FIELDS CONFIG
════════════════════════════════ */
const FIELDS = [
  { id:'f_user',      label:'Username',       emoji:'👻', bold:true  },
  { id:'f_pass',      label:'Password',       emoji:'🔒', bold:true  },
  { id:'f_email',     label:'Account Email',  emoji:'📧', bold:false },
  { id:'f_emailpass', label:'Email Password', emoji:'🔑', bold:false },
  { id:'f_score',     label:'Snap Score',     emoji:'🔥', bold:true  },
  { id:'f_followers', label:'Followers',      emoji:'👥', bold:false },
  { id:'f_price',     label:'Price',          emoji:'💰', bold:true  },
];

/* ════════════════════════════════
   PASTE
════════════════════════════════ */
async function pf(id) {
  try {
    const txt = await navigator.clipboard.readText();
    document.getElementById(id).value = txt.trim();
    livePreview();
    showToast('📋 Pasted!', false);
  } catch(e) {
    showToast('⚠️ Allow clipboard access', false);
  }
}

/* ════════════════════════════════
   BUILD MESSAGE
════════════════════════════════ */
function buildMessage() {
  const lines = [];

  // Header
  lines.push('🌟 *SnapScoreStore*');
  lines.push('━━━━━━━━━━━━━━━━━━━━');

  let hasAnyField = false;

  // Account Credentials section
  const credFields  = FIELDS.filter(f => ['f_user','f_pass'].includes(f.id));
  const credFilled  = credFields.filter(f => val(f.id));
  if (credFilled.length) {
    lines.push('');
    lines.push('🔐 *Account Credentials*');
    credFilled.forEach(f => {
      lines.push(`${f.emoji} *${f.label}:* ${val(f.id)}`);
    });
    hasAnyField = true;
  }

  // Email section
  const emailFields = FIELDS.filter(f => ['f_email','f_emailpass'].includes(f.id));
  const emailFilled = emailFields.filter(f => val(f.id));
  if (emailFilled.length) {
    lines.push('');
    lines.push('📩 *Email Credentials*');
    emailFilled.forEach(f => {
      lines.push(`${f.emoji} *${f.label}:* ${val(f.id)}`);
    });
    hasAnyField = true;
  }

  // Stats & Price section
  const statFields = FIELDS.filter(f => ['f_score','f_followers','f_price'].includes(f.id));
  const statFilled = statFields.filter(f => val(f.id));
  if (statFilled.length) {
    lines.push('');
    lines.push('📊 *Account Stats & Price*');
    statFilled.forEach(f => {
      lines.push(`${f.emoji} *${f.label}:* ${val(f.id)}`);
    });
    hasAnyField = true;
  }

  if (!hasAnyField) return null;

  lines.push('');
  lines.push('━━━━━━━━━━━━━━━━━━━━');
  lines.push('✅ *Verified by SnapScoreStore*');
  lines.push('🌐 snapscores.store');

  return lines.join('\n');
}

function val(id) {
  return (document.getElementById(id)?.value || '').trim();
}

/* ════════════════════════════════
   LIVE PREVIEW
════════════════════════════════ */
function livePreview() {
  const msg = buildMessage();
  const box = document.getElementById('previewBox');

  // Update pills
  updatePills();

  if (!msg) {
    box.className = 'preview-box empty';
    box.textContent = 'Fill in fields above to see the WhatsApp message preview...';
    return;
  }

  box.className = 'preview-box';
  // Render bold markdown (*text*) visually
  box.innerHTML = renderPreview(msg);
}

function renderPreview(msg) {
  return msg
    .split('\n')
    .map(line => {
      // Bold *text*
      line = line.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
      return `<span>${line}</span>`;
    })
    .join('<br>');
}

/* ════════════════════════════════
   PILLS
════════════════════════════════ */
function updatePills() {
  const container = document.getElementById('fieldCount');
  container.innerHTML = '';
  FIELDS.forEach(f => {
    const filled = !!val(f.id);
    const pill = document.createElement('span');
    pill.className = 'fc-pill' + (filled ? ' filled' : '');
    pill.textContent = (filled ? '✓ ' : '') + f.label;
    container.appendChild(pill);
  });
}

/* ════════════════════════════════
   DISPATCH
════════════════════════════════ */
function dispatch() {
  const receiver = val('f_receiver').replace(/[\s\-()]/g, '');

  if (!receiver) {
    showToast('⚠️ Enter receiver WhatsApp number!', false);
    document.getElementById('f_receiver').focus();
    // Shake animation
    const rc = document.querySelector('.receiver-card');
    rc.style.animation = 'shake .4s ease';
    setTimeout(() => rc.style.animation = '', 400);
    return;
  }

  const msg = buildMessage();
  if (!msg) {
    showToast('⚠️ Fill at least one account field!', false);
    return;
  }

  // Normalize receiver number
  let phone = receiver;
  if (!phone.startsWith('+') && !phone.startsWith('00')) {
    phone = '+' + phone;
  }
  phone = phone.replace(/\D/g, '');

  const encoded = encodeURIComponent(msg);
  const url = `https://wa.me/${phone}?text=${encoded}`;

  window.open(url, '_blank');
  showToast('✅ Opening WhatsApp!', true);
}

/* ════════════════════════════════
   CLEAR
════════════════════════════════ */
function clearAll() {
  ['f_receiver','f_user','f_pass','f_email','f_emailpass','f_score','f_followers','f_price']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  livePreview();
  showToast('🗑️ All fields cleared', false);
}

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
function showToast(msg, isGreen) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isGreen ? ' green' : '') + ' show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ════════════════════════════════
   SHAKE KEYFRAME (injected)
════════════════════════════════ */
const style = document.createElement('style');
style.textContent = `
@keyframes shake {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}
  40%{transform:translateX(6px);}
  60%{transform:translateX(-4px)
