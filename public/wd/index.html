<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapScoreStore – WA Dispatcher</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --g1: #00E676;
  --g2: #00C853;
  --g3: #1B5E20;
  --gold: #FFD600;
  --gold2: #FF6F00;
  --bg: #050505;
  --s1: #0D0D0D;
  --s2: #141414;
  --s3: #1A1A1A;
  --border: rgba(255,255,255,0.07);
  --borderG: rgba(0,230,118,0.22);
  --text: #EAEAEA;
  --muted: #555;
  --font: 'Space Grotesk', sans-serif;
  --mono: 'Space Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG FX */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 0% 0%, rgba(0,230,118,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(255,214,0,0.06) 0%, transparent 55%);
  pointer-events: none; z-index: 0;
}

.page { position: relative; z-index: 1; max-width: 660px; margin: 0 auto; padding: 32px 18px 90px; }

/* ── HEADER ── */
.hdr {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 34px; padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.hdr-logo { height: 42px; filter: drop-shadow(0 0 12px rgba(0,230,118,0.4)); }
.hdr-title { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
.hdr-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }
.hdr-chip {
  margin-left: auto;
  background: linear-gradient(135deg, var(--g1), var(--g2));
  color: #000; font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.1em; padding: 5px 12px; border-radius: 30px;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
  font-family: var(--mono);
}

/* ── BLOCKS ── */
.block {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 20px;
  margin-bottom: 14px;
  transition: border-color 0.25s;
}
.block:focus-within { border-color: rgba(0,230,118,0.3); }
.block.receiver-block { border-color: var(--borderG); background: rgba(0,230,118,0.04); }

.block-title {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.block-title i { font-size: 0.8rem; }
.block-title.green { color: var(--g1); }
.block-title.gold { color: var(--gold); }

/* ── GRID ── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* ── FIELD ── */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 0.63rem; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
}
.field-row { display: flex; }
.field-row input {
  flex: 1; background: var(--s2); border: 1px solid var(--border);
  border-right: none; border-radius: 10px 0 0 10px;
  color: var(--text); font-family: var(--font);
  font-size: 0.88rem; font-weight: 500;
  padding: 10px 12px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.receiver-block .field-row input {
  border-color: rgba(0,230,118,0.2);
}
.field-row input:focus {
  border-color: var(--g1);
  background: rgba(0,230,118,0.04);
}
.receiver-block .field-row input:focus {
  border-color: var(--g1);
  box-shadow: 0 0 0 3px rgba(0,230,118,0.08);
}
.field-row input::placeholder { color: var(--muted); font-size: 0.82rem; }

.paste-btn {
  background: var(--s3); border: 1px solid var(--border);
  border-left: none; border-radius: 0 10px 10px 0;
  color: var(--muted); cursor: pointer;
  padding: 0 12px; font-size: 0.7rem;
  transition: all 0.2s; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  font-family: var(--mono); font-weight: 700; letter-spacing: 0.06em;
}
.paste-btn:hover { background: var(--g1); color: #000; border-color: var(--g1); }
.paste-btn:active { transform: scale(0.97); }
.paste-btn i { font-size: 0.75rem; }

/* ── PREVIEW ── */
.preview-block {
  background: var(--s1); border: 1px solid var(--borderG);
  border-radius: 16px; padding: 20px; margin-bottom: 14px;
}
.preview-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.preview-title {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--g1);
  display: flex; align-items: center; gap: 7px;
}
.preview-pills {
  display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px;
}
.pill {
  font-size: 0.58rem; font-family: var(--mono); font-weight: 700;
  letter-spacing: 0.08em; padding: 3px 9px; border-radius: 20px;
  background: var(--s2); border: 1px solid var(--border); color: var(--muted);
  transition: all 0.25s;
}
.pill.on { background: rgba(0,230,118,0.1); border-color: rgba(0,230,118,0.35); color: var(--g1); }

.preview-phone {
  font-size: 0.7rem; color: var(--muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono);
}
.preview-phone span { color: var(--g1); font-weight: 700; }

/* The actual message box styled like WhatsApp */
.wa-bubble-wrap {
  background: #0a0a0a;
  border-radius: 12px;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.05);
}
.wa-bubble {
  background: #1F2C34;
  border-radius: 0 10px 10px 10px;
  padding: 12px 14px;
  font-size: 0.84rem;
  line-height: 1.75;
  color: #E9E9E9;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 50px;
  font-family: var(--font);
  position: relative;
}
.wa-bubble::before {
  content: '';
  position: absolute; top: 0; left: -8px;
  border-width: 0 8px 8px 0;
  border-style: solid;
  border-color: transparent #1F2C34 transparent transparent;
}
.wa-bubble strong { color: #ffffff; font-weight: 700; }
.wa-bubble .divider { color: #3a4a54; }
.wa-bubble .section-head { color: var(--g1); font-weight: 700; }
.wa-bubble .row-key { color: #8899a6; }
.wa-bubble .row-val { color: #e9e9e9; font-weight: 600; }
.wa-time {
  text-align: right; font-size: 0.62rem; color: #556d7a;
  margin-top: 5px; font-family: var(--mono);
}
.wa-bubble.empty-state {
  color: var(--muted); font-style: italic;
  display: flex; align-items: center; justify-content: center;
  min-height: 70px; text-align: center;
  font-size: 0.8rem;
}

/* ── DISPATCH BTN ── */
.dispatch-btn {
  width: 100%;
  background: linear-gradient(135deg, #00E676 0%, #00C853 50%, #00A040 100%);
  border: none; outline: none;
  color: #000; font-family: var(--mono);
  font-size: 0.82rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 17px;
  border-radius: 14px; cursor: pointer;
  position: relative; overflow: hidden;
  box-shadow: 0 6px 28px rgba(0,230,118,0.35);
  transition: all 0.3s; margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.dispatch-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%); transition: transform 0.5s;
}
.dispatch-btn:hover::after { transform: translateX(100%); }
.dispatch-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(0,230,118,0.5); }
.dispatch-btn:active { transform: translateY(0) scale(0.99); }
.dispatch-btn i { font-size: 1.05rem; }

.clear-btn {
  width: 100%; margin-top: 10px;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); font-family: var(--mono);
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 12px;
  border-radius: 12px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.clear-btn:hover { border-color: rgba(255,80,80,0.35); color: #ff6b6b; background: rgba(255,80,80,0.05); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: #111; color: var(--g1);
  font-family: var(--mono); font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.1em; padding: 11px 22px;
  border-radius: 30px; border: 1px solid var(--g1);
  z-index: 9999; opacity: 0; white-space: nowrap;
  transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.warn { border-color: #FF6F00; color: #FF6F00; }

/* ── RESPONSIVE ── */
@media (max-width: 560px) {
  .g2, .g3 { grid-template-columns: 1fr 1fr; }
  .hdr-chip { display: none; }
}
@media (max-width: 380px) {
  .g2, .g3 { grid-template-columns: 1fr; }
}

/* Shake */
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.shake { animation: shake 0.4s ease; }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="hdr">
    <img class="hdr-logo" src="https://freesnapscores.com/assets/logo.svg" alt="Logo"
      onerror="this.style.display='none'">
    <div>
      <div class="hdr-title">SnapScoreStore</div>
      <div class="hdr-sub">WhatsApp Account Dispatcher</div>
    </div>
    <div class="hdr-chip"><i class="fab fa-whatsapp"></i> DISPATCHER</div>
  </header>

  <!-- ① RECEIVER -->
  <div class="block receiver-block">
    <div class="block-title green"><i class="fab fa-whatsapp"></i> Receiver WhatsApp Number</div>
    <div class="field">
      <label>Phone number with country code</label>
      <div class="field-row">
        <input type="tel" id="f_receiver" placeholder="+92 300 1234567" oninput="updateAll()">
        <button class="paste-btn" onclick="pf('f_receiver')"><i class="fas fa-paste"></i> PASTE</button>
      </div>
    </div>
  </div>

  <!-- ② CREDENTIALS -->
  <div class="block">
    <div class="block-title gold"><i class="fas fa-ghost"></i> Account Credentials</div>
    <div class="g2">
      <div class="field">
        <label>Username</label>
        <div class="field-row">
          <input type="text" id="f_user" placeholder="@username" oninput="updateAll()">
          <button class="paste-btn" onclick="pf('f_user')"><i class="fas fa-paste"></i> PASTE</button>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-row">
          <input type="text" id="f_pass" placeholder="Password" oninput="updateAll()">
          <button class="paste-btn" onclick="pf('f_pass')"><i class="fas fa-paste"></i> PASTE</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ③ EMAIL -->
  <div class="block">
    <div class="block-title gold"><i class="fas fa-envelope-open-text"></i> Email Credentials</div>
    <div class="g2">
      <div class="field">
        <label>Account Email</label>
        <div class="field-row">
          <input type="text" id="f_email" placeholder="account@gmail.com" oninput="updateAll()">
          <button class="paste-btn" onclick="pf('f_email')"><i class="fas fa-paste"></i> PASTE</button>
        </div>
      </div>
      <div class="field">
        <label>Email Password</label>
        <div class="field-row">
          <input type="text" id="f_emailpass" placeholder="Email password" oninput="updateAll()">
          <button class="paste-btn" onclick="pf('f_emailpass')"><i class="fas fa-paste"></i> PASTE</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ④ STATS -->
  <div class="block">
    <div class="block-title gold"><i class="fas fa-chart-bar"></i> Stats & Pricing</div>
    <div class="g3">
      <div class="field">
        <label>Snap Score</label>
        <div class="field-row">
          <input type="text" id="f_score" placeholder="125000" oninput="updateAll()">
          <button class="paste-btn" onclick="pf('f_score')"><i class="fas fa-paste"></i> PASTE</button>
        </div>
      </div>
      <div class="field">
        <label>Followers</label>
        <div class="field-row">
          <input type="text" id="f_followers" placeholder="4500" oninput="updateAll()">
          <button class="paste-btn" onclick="pf('f_followers')"><i class="fas fa-paste"></i> PASTE</button>
        </div>
      </div>
      <div class="field">
        <label>Price / Method</label>
        <div class="field-row">
          <input type="text" id="f_price" placeholder="PKR 1,200" oninput="updateAll()">
          <button class="paste-btn" onclick="pf('f_price')"><i class="fas fa-paste"></i> PASTE</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ⑤ PREVIEW -->
  <div class="preview-block">
    <div class="preview-header">
      <div class="preview-title"><i class="fab fa-whatsapp"></i> Live Message Preview</div>
    </div>
    <div class="preview-pills" id="pills"></div>
    <div class="preview-phone" id="phoneDisplay">
      <i class="fas fa-paper-plane"></i> To: <span>—</span>
    </div>
    <div class="wa-bubble-wrap">
      <div class="wa-bubble empty-state" id="waBubble">
        Fill fields above — message will appear here in real-time...
      </div>
      <div class="wa-time" id="waTime"></div>
    </div>
  </div>

  <!-- DISPATCH -->
  <button class="dispatch-btn" id="dispatchBtn" onclick="dispatch()">
    <i class="fab fa-whatsapp"></i>
    DISPATCH TO WHATSAPP
  </button>

  <button class="clear-btn" onclick="clearAll()">
    <i class="fas fa-trash-alt"></i> CLEAR ALL
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Field definitions ───────────────────────────────────────
const FIELDS = [
  { id: 'f_user',      label: 'Username',        emoji: '👻', section: 'cred'  },
  { id: 'f_pass',      label: 'Password',         emoji: '🔒', section: 'cred'  },
  { id: 'f_email',     label: 'Account Email',    emoji: '📧', section: 'email' },
  { id: 'f_emailpass', label: 'Email Password',   emoji: '🔑', section: 'email' },
  { id: 'f_score',     label: 'Snap Score',       emoji: '🔥', section: 'stats' },
  { id: 'f_followers', label: 'Followers',        emoji: '👥', section: 'stats' },
  { id: 'f_price',     label: 'Price',            emoji: '💰', section: 'stats' },
];

// ─── Helpers ─────────────────────────────────────────────────
function gv(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function now12() {
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

// ─── Build plain-text WhatsApp message ───────────────────────
function buildMsg() {
  const cred  = FIELDS.filter(f => f.section === 'cred'  && gv(f.id));
  const email = FIELDS.filter(f => f.section === 'email' && gv(f.id));
  const stats = FIELDS.filter(f => f.section === 'stats' && gv(f.id));

  if (!cred.length && !email.length && !stats.length) return '';

  let lines = [];
  lines.push('🌟 *SnapScoreStore*');
  lines.push('━━━━━━━━━━━━━━━━━━━');

  if (cred.length) {
    lines.push('');
    lines.push('🔐 *Account Credentials*');
    cred.forEach(f => lines.push(`${f.emoji} *${f.label}:* ${gv(f.id)}`));
  }
  if (email.length) {
    lines.push('');
    lines.push('📩 *Email Credentials*');
    email.forEach(f => lines.push(`${f.emoji} *${f.label}:* ${gv(f.id)}`));
  }
  if (stats.length) {
    lines.push('');
    lines.push('📊 *Stats & Price*');
    stats.forEach(f => lines.push(`${f.emoji} *${f.label}:* ${gv(f.id)}`));
  }

  lines.push('');
  lines.push('━━━━━━━━━━━━━━━━━━━');
  lines.push('✅ *Verified by SnapScoreStore*');
  lines.push('🌐 snapscores.store');

  return lines.join('\n');
}

// ─── Render preview bubble (styled) ──────────────────────────
function renderBubble(msg) {
  if (!msg) return null;
  // Convert *bold* → <strong> and line breaks → <br>
  let html = '';
  msg.split('\n').forEach(line => {
    // Divider lines
    if (line.startsWith('━')) {
      html += `<span class="divider">${line}</span><br>`;
      return;
    }
    // Section headers (lines that start with emoji and have only *text*)
    if (/^[🔐📩📊🌟✅🌐]/.test(line) && line.includes('*') && !line.includes(':')) {
      const clean = line.replace(/\*(.*?)\*/g, '$1');
      html += `<span class="section-head">${clean}</span><br>`;
      return;
    }
    // Key: Value lines
    if (line.includes(':') && line.includes('*')) {
      const formatted = line.replace(/\*(.*?):\*/g, (_, k) =>
        `<span class="row-key">${k}:</span>`
      ).replace(/\*([^*]+)\*/g, '<strong>$1</strong>');
      html += `<span>${formatted}</span><br>`;
      return;
    }
    // Other bold
    const formatted = line.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
    html += `<span>${formatted}</span><br>`;
  });
  return html;
}

// ─── Update everything ────────────────────────────────────────
function updateAll() {
  // Pills
  const pillsEl = document.getElementById('pills');
  pillsEl.innerHTML = '';
  FIELDS.forEach(f => {
    const on = !!gv(f.id);
    const p = document.createElement('span');
    p.className = 'pill' + (on ? ' on' : '');
    p.textContent = (on ? '✓ ' : '') + f.label;
    pillsEl.appendChild(p);
  });

  // Receiver display
  const rec = gv('f_receiver');
  const phoneEl = document.getElementById('phoneDisplay');
  phoneEl.innerHTML = `<i class="fas fa-paper-plane"></i> To: <span>${rec || '—'}</span>`;

  // Time
  document.getElementById('waTime').textContent = now12();

  // Message
  const msg = buildMsg();
  const bubble = document.getElementById('waBubble');

  if (!msg) {
    bubble.className = 'wa-bubble empty-state';
    bubble.innerHTML = 'Fill fields above — message will appear here in real-time...';
    return;
  }

  bubble.className = 'wa-bubble';
  bubble.innerHTML = renderBubble(msg);
}

// ─── PASTE ───────────────────────────────────────────────────
async function pf(id) {
  try {
    // Modern clipboard API
    if (navigator.clipboard && navigator.clipboard.readText) {
      const text = await navigator.clipboard.readText();
      document.getElementById(id).value = text.trim();
      updateAll();
      showToast('📋 Pasted!');
      return;
    }
    // Fallback: execCommand
    const el = document.getElementById(id);
    el.focus();
    document.execCommand('paste');
    updateAll();
    showToast('📋 Pasted!');
  } catch (e) {
    // Manual fallback prompt
    const text = prompt('Clipboard access denied. Paste your text here:');
    if (text !== null) {
      document.getElementById(id).value = text.trim();
      updateAll();
      showToast('📋 Pasted manually!');
    }
  }
}

// ─── DISPATCH ────────────────────────────────────────────────
function dispatch() {
  const rawNum = gv('f_receiver');

  if (!rawNum) {
    shake(document.querySelector('.receiver-block'));
    showToast('⚠️ Enter receiver number first!', true);
    document.getElementById('f_receiver').focus();
    return;
  }

  const msg = buildMsg();
  if (!msg) {
    showToast('⚠️ Fill at least one account field!', true);
    return;
  }

  // Clean phone number — keep digits only, ensure no leading +
  let phone = rawNum.replace(/\s/g, '').replace(/[^0-9+]/g, '');
  // Remove leading + for wa.me URL (wa.me needs digits only)
  phone = phone.replace(/^\+/, '');

  // Build wa.me URL
  const encoded = encodeURIComponent(msg);
  const url = 'https://wa.me/' + phone + '?text=' + encoded;

  // Open
  const win = window.open(url, '_blank');
  if (!win || win.closed || typeof win.closed === 'undefined') {
    // Popup blocked — fallback: navigate directly
    window.location.href = url;
  }

  showToast('✅ Opening WhatsApp!');
}

// ─── CLEAR ───────────────────────────────────────────────────
function clearAll() {
  ['f_receiver','f_user','f_pass','f_email','f_emailpass','f_score','f_followers','f_price']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  updateAll();
  showToast('🗑️ Cleared!');
}

// ─── SHAKE ───────────────────────────────────────────────────
function shake(el) {
  el.classList.remove('shake');
  void el.offsetWidth; // reflow
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 500);
}

// ─── TOAST ───────────────────────────────────────────────────
function showToast(msg, warn) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (warn ? ' warn' : '') + ' show';
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), 2700);
}

// ─── INIT ────────────────────────────────────────────────────
updateAll();
</script>
</body>
