<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapScoreStore – Invoice Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --gold: #FFD700;
    --gold-dim: #C9A800;
    --gold-glow: rgba(255,215,0,0.18);
    --black: #0A0A0A;
    --dark: #111111;
    --card: rgba(20,20,20,0.82);
    --border: rgba(255,215,0,0.18);
    --text: #F0F0F0;
    --text-dim: #888;
    --glass: rgba(255,255,255,0.04);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 10%, rgba(255,215,0,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 85% 80%, rgba(255,180,0,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 40% 60% at 50% 50%, rgba(20,20,20,1) 40%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }

  /* HEADER */
  .site-header {
    display: flex; align-items: center; gap: 18px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .site-header img { height: 54px; filter: drop-shadow(0 0 14px rgba(255,215,0,0.5)); }
  .site-header-text {}
  .site-header-text h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.55rem; font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-shadow: 0 0 22px rgba(255,215,0,0.4);
  }
  .site-header-text p {
    font-size: 0.82rem; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px;
  }
  .badge {
    margin-left: auto;
    background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
    color: #000; font-family: 'Orbitron', monospace;
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em;
    padding: 5px 12px; border-radius: 20px;
    text-transform: uppercase;
    box-shadow: 0 0 18px rgba(255,215,0,0.35);
  }

  /* SECTION CARDS */
  .card {
    background: var(--card);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 30px;
    margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,215,0,0.08);
    transition: border-color 0.3s;
  }
  .card:hover { border-color: rgba(255,215,0,0.32); }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.18em;
    color: var(--gold); text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 24px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .card-title i { font-size: 1rem; }

  /* FORM GRID */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .form-grid.triple { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 7px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 600;
  }

  .input-wrap { position: relative; display: flex; }

  input[type="text"], input[type="email"], input[type="number"], input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem; font-weight: 500;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
  }
  input:focus {
    border-color: var(--gold);
    background: rgba(255,215,0,0.06);
    box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
  }
  .has-paste input { border-radius: 10px 0 0 10px; }

  .paste-btn {
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    border: none; outline: none; cursor: pointer;
    color: #000; font-family: 'Orbitron', monospace;
    font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em;
    padding: 0 13px; border-radius: 0 10px 10px 0;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .paste-btn:hover { opacity: 0.85; transform: scale(1.03); }
  .paste-btn:active { transform: scale(0.97); }

  /* PAYMENT GRID */
  .payment-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .payment-option { display: none; }
  .payment-label {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 14px 8px;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,215,0,0.12);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative; overflow: hidden;
  }
  .payment-label::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,215,0,0.12), transparent);
    opacity: 0; transition: opacity 0.25s;
  }
  .payment-label:hover { border-color: rgba(255,215,0,0.4); transform: translateY(-2px); }
  .payment-label:hover::before { opacity: 1; }
  .payment-option:checked + .payment-label {
    border-color: var(--gold);
    background: rgba(255,215,0,0.1);
    box-shadow: 0 0 20px rgba(255,215,0,0.25), inset 0 0 14px rgba(255,215,0,0.07);
  }
  .payment-option:checked + .payment-label::before { opacity: 1; }
  .payment-label img { width: 46px; height: 28px; object-fit: contain; }
  .payment-label .pay-icon { font-size: 1.5rem; color: var(--gold); }
  .payment-label span { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); font-weight: 600; }
  .payment-option:checked + .payment-label span { color: var(--gold); }
  .checkmark {
    position: absolute; top: 6px; right: 8px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--gold); color: #000;
    font-size: 0.6rem; display: none;
    align-items: center; justify-content: center;
    font-weight: 900;
  }
  .payment-option:checked + .payment-label .checkmark { display: flex; }

  /* FILE UPLOAD */
  .file-drop {
    border: 2px dashed rgba(255,215,0,0.25);
    border-radius: 14px;
    padding: 28px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(255,215,0,0.02);
    position: relative;
  }
  .file-drop:hover { border-color: var(--gold); background: rgba(255,215,0,0.05); }
  .file-drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-drop i { font-size: 2rem; color: var(--gold); margin-bottom: 8px; display: block; }
  .file-drop p { font-size: 0.85rem; color: var(--text-dim); }
  .file-drop strong { color: var(--gold); }
  #filePreview { max-width: 100%; max-height: 160px; border-radius: 10px; margin-top: 14px; display: none; object-fit: cover; border: 1px solid var(--border); }

  /* GENERATE BTN */
  .generate-btn {
    width: 100%;
    background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF6B00 100%);
    border: none; outline: none;
    color: #000; font-family: 'Orbitron', monospace;
    font-size: 0.95rem; font-weight: 900; letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 18px 36px;
    border-radius: 14px;
    cursor: pointer;
    position: relative; overflow: hidden;
    box-shadow: 0 8px 32px rgba(255,165,0,0.35);
    transition: all 0.3s;
    margin-top: 8px;
  }
  .generate-btn::before {
    content: '';
    position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transition: left 0.5s;
  }
  .generate-btn:hover::before { left: 100%; }
  .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,165,0,0.5); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn i { margin-right: 10px; }

  /* ===================== INVOICE MODAL ===================== */
  .invoice-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    overflow-y: auto;
    padding: 30px 16px;
    animation: fadeIn 0.35s ease;
  }
  .invoice-overlay.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .invoice-actions {
    display: flex; justify-content: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .action-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer;
    font-family: 'Orbitron', monospace; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-pdf { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; }
  .btn-png { background: linear-gradient(135deg, #27ae60, #1e8449); color: #fff; }
  .btn-close { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
  .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }

  /* INVOICE ITSELF */
  #invoiceDoc {
    width: 794px; /* A4 at 96dpi */
    max-width: 100%;
    margin: 0 auto;
    background: #fff;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    position: relative;
    font-family: 'Inter', sans-serif;
    color: #1a1a1a;
  }

  /* Watermark */
  #invoiceDoc::after {
    content: 'PAID SECURELY';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-35deg);
    font-family: 'Orbitron', monospace;
    font-size: 4.5rem; font-weight: 900;
    color: rgba(0,180,0,0.07);
    white-space: nowrap; pointer-events: none;
    letter-spacing: 0.1em; z-index: 50;
    border: 8px solid rgba(0,180,0,0.06);
    padding: 10px 28px;
    border-radius: 10px;
  }

  .inv-header {
    background: linear-gradient(135deg, #0A0A0A 0%, #1a1a1a 60%, #222 100%);
    padding: 32px 40px 28px;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .inv-logo img { height: 52px; filter: brightness(0) invert(1); }
  .inv-logo p { color: rgba(255,255,255,0.5); font-size: 0.72rem; margin-top: 6px; letter-spacing: 0.1em; }

  .inv-title-block { text-align: right; }
  .inv-title-block h2 {
    font-family: 'Orbitron', monospace;
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 0.12em;
  }
  .inv-title-block .inv-num {
    color: rgba(255,255,255,0.6); font-size: 0.78rem; margin-top: 4px;
    font-family: 'Rajdhani', sans-serif; letter-spacing: 0.08em;
  }
  .inv-title-block .inv-date {
    color: rgba(255,215,0,0.7); font-size: 0.72rem; margin-top: 3px;
    font-family: 'Rajdhani', sans-serif; letter-spacing: 0.06em;
  }

  /* Gold bar */
  .inv-gold-bar {
    height: 4px;
    background: linear-gradient(90deg, #FFD700, #FF8C00, #FFD700);
  }

  .inv-body { padding: 32px 40px; }

  .inv-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; }

  .inv-section-label {
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: #999; margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid #eee;
  }

  .inv-client-name { font-size: 1.05rem; font-weight: 700; color: #111; }
  .inv-client-sub { font-size: 0.82rem; color: #555; margin-top: 3px; }

  .inv-payment-block { display: flex; align-items: center; gap: 12px; }
  .inv-payment-block img { height: 30px; object-fit: contain; }
  .inv-payment-block .pay-name { font-size: 0.9rem; font-weight: 600; color: #333; }

  /* Account table */
  .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  .inv-table thead tr { background: #0A0A0A; }
  .inv-table thead th {
    padding: 10px 14px; text-align: left;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: #FFD700;
  }
  .inv-table tbody tr { border-bottom: 1px solid #f0f0f0; }
  .inv-table tbody tr:last-child { border-bottom: none; }
  .inv-table tbody td { padding: 10px 14px; font-size: 0.85rem; color: #333; }
  .inv-table tbody tr:nth-child(even) { background: #fafafa; }
  .inv-table .label-cell { color: #666; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em; }
  .inv-table .val-cell { font-weight: 600; color: #111; word-break: break-all; }

  /* Credentials box */
  .credentials-box {
    background: #f8f9fa; border: 1px solid #e8e8e8;
    border-left: 4px solid #FFD700;
    border-radius: 6px; padding: 16px 20px; margin-bottom: 24px;
  }
  .credentials-box h4 {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: #999; margin-bottom: 12px;
  }
  .cred-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .cred-key { font-size: 0.75rem; font-weight: 700; color: #666; min-width: 130px; }
  .cred-val { font-size: 0.8rem; color: #111; font-family: 'Courier New', monospace; background: #fff; padding: 2px 8px; border-radius: 4px; border: 1px solid #e0e0e0; flex: 1; word-break: break-all; }

  /* Total */
  .inv-total-row {
    display: flex; justify-content: flex-end; margin-bottom: 24px;
  }
  .inv-total-box {
    background: linear-gradient(135deg, #0A0A0A, #1a1a1a);
    color: #fff; border-radius: 12px;
    padding: 18px 28px; text-align: right;
    min-width: 220px;
  }
  .inv-total-box .total-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .inv-total-box .total-amount {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem; font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-top: 4px;
  }

  /* Proof */
  .inv-proof { margin-bottom: 24px; }
  .inv-proof img { max-width: 100%; max-height: 200px; border-radius: 8px; border: 1px solid #eee; object-fit: contain; }

  /* Footer */
  .inv-footer {
    background: linear-gradient(135deg, #0A0A0A, #1a1a1a);
    padding: 20px 40px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .inv-footer p { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
  .inv-footer .paid-stamp {
    background: linear-gradient(135deg, #27ae60, #1e8449);
    color: #fff; font-family: 'Orbitron', monospace;
    font-size: 0.72rem; font-weight: 900; letter-spacing: 0.2em;
    padding: 6px 18px; border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.3);
    transform: rotate(-2deg); display: inline-block;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: #222; color: var(--gold);
    font-family: 'Orbitron', monospace; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.1em; padding: 12px 24px; border-radius: 30px;
    border: 1px solid var(--gold); z-index: 9999;
    transition: transform 0.35s cubic-bezier(.68,-0.55,.27,1.55), opacity 0.35s;
    opacity: 0;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.triple { grid-template-columns: 1fr 1fr; }
    .payment-grid { grid-template-columns: repeat(3, 1fr); }
    .inv-header { flex-direction: column; gap: 16px; }
    .inv-title-block { text-align: left; }
    .inv-two-col { grid-template-columns: 1fr; }
    .inv-body { padding: 20px; }
    #invoiceDoc { width: 100%; }
    .site-header { flex-wrap: wrap; }
    .badge { margin-left: 0; }
  }
  @media (max-width: 440px) {
    .payment-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid.triple { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <!-- HEADER -->
  <header class="site-header">
    <img src="https://freesnapscores.com/assets/logo.svg" alt="SnapScoreStore Logo" onerror="this.style.display='none'">
    <div class="site-header-text">
      <h1>SnapScoreStore</h1>
      <p>Social Media Account Invoice Generator</p>
    </div>
    <span class="badge">⚡ Pro Tool</span>
  </header>

  <!-- SECTION 1: BILL TO -->
  <div class="card">
    <div class="card-title"><i class="fas fa-user-tie"></i> Bill To — Client Information</div>
    <div class="form-grid">
      <div class="form-group">
        <label for="clientName">Client Name</label>
        <input type="text" id="clientName" placeholder="e.g. John Doe">
      </div>
      <div class="form-group">
        <label for="whatsapp">WhatsApp Number</label>
        <input type="text" id="whatsapp" placeholder="+1 234 567 8900">
      </div>
      <div class="form-group full">
        <label for="clientEmail">Email Address</label>
        <input type="email" id="clientEmail" placeholder="client@example.com">
      </div>
    </div>
  </div>

  <!-- SECTION 2: ACCOUNT DETAILS -->
  <div class="card">
    <div class="card-title"><i class="fas fa-ghost"></i> Account Details</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap has-paste">
          <input type="text" id="accUsername" placeholder="@username">
          <button class="paste-btn" onclick="pasteField('accUsername')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap has-paste">
          <input type="text" id="accPassword" placeholder="••••••••">
          <button class="paste-btn" onclick="pasteField('accPassword')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
      <div class="form-group">
        <label>Account Email</label>
        <div class="input-wrap has-paste">
          <input type="text" id="accEmail" placeholder="account@snap.com">
          <button class="paste-btn" onclick="pasteField('accEmail')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
      <div class="form-group">
        <label>Email Password</label>
        <div class="input-wrap has-paste">
          <input type="text" id="emailPassword" placeholder="email pass">
          <button class="paste-btn" onclick="pasteField('emailPassword')"><i class="fas fa-paste"></i>PASTE</button>
        </div>
      </div>
    </div>
    <div class="form-grid triple" style="margin-top:18px;">
      <div class="form-group">
        <label>Snap Score</label>
        <input type="number" id="accScore" placeholder="e.g. 125000">
      </div>
      <div class="form-group">
        <label>Followers</label>
        <in
